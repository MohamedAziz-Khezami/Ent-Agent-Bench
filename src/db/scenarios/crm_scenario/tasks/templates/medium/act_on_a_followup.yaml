# ──────────────────────────────────────────────────────────────────────
# TASK TYPE: act_on_a_followup   (medium tier — 2 chained actions, 1 distractor)
#
# WHAT THE MODEL IS ASKED (example):
#   "Can you handle the overdue follow-up on the Initech deal? push its
#    due date to 2026-06-08, then mark it as done. I need the followup_id
#    back."
#
# WHAT IT TESTS:
#   Finding ONE overdue follow-up and chaining both follow-up actions on
#   it, with a second, NOT-overdue follow-up on the very same deal as a
#   distractor.
#
# HOW IT'S MADE VALID:
#   The company is reserved; the planted follow-up is the only open+past-
#   due one in the world. The distractor is open but due in the FUTURE —
#   plausibly confusable, never matching "overdue".
# ──────────────────────────────────────────────────────────────────────
name: act_on_a_followup
answer_keys: [followup_id]
n_functions: 3      # 1 lookup + 2 actions
n_actions: 2

# ── 1. dice rolls ────────────────────────────────────────────────────────
params:
  company: {draw: company}
  contact_name: {draw: person_name}
  chosen: {sample: followup_actions, k: 2}
  due: {sim_date_offset: {choice: [3, 5, 7, 10]}}

# ── 2. rows planted into the world ─────────────────────────────────────
kernel:
  - {ref: the_contact, table: contacts, row: {name: "{contact_name}", company: "{company}"}}
  - {ref: the_lead, table: leads, row: {contact_id: "@the_contact"}}
  - {ref: the_deal, table: deals, row: {lead_id: "@the_lead", stage: {choice: [prospecting, qualification, proposal, negotiation, closing]}}}
  - {ref: the_followup, table: followups,
     row: {deal_id: "@the_deal", due_date: {sim_date_offset: {randint: [-15, -1]}}, status: open}}

# a second follow-up on the SAME deal, due in the future — not "overdue"
distractors:
  - {ref: d_followup, table: followups, repeat: 1,
     row: {deal_id: "@the_deal", due_date: {sim_date_offset: {randint: [5, 15]}}, status: open}}

# ── 3. what a correct solution must have changed ───────────────────────
effects:
  from_chosen_actions: {anchor: "@the_followup"}

# ── 4. the correct answer ──────────────────────────────────────────────
answer: {followup_id: "@the_followup"}

# ── 5. how the query is phrased ─────────────────────────────────────────
entity: "overdue follow-up on the {company} deal"
phrasings:
  - "The {entity} has gone quiet — {actions}. Report {answer_key}."
  - "Can you handle the {entity}? {actions}. I need the {answer_key} back."
  - "For the {entity}: {actions}. Answer with the {answer_key} you used."
