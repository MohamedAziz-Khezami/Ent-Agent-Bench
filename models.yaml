# registry of models to benchmark.
models:
  - name: gemma4-ollama-local
    backend: openai_compatible
    model_id: gemma4
    base_url: http://localhost:11434/v1
    api_key_env: null
    supports_tool_calling: true   # confirmed via a real /v1/chat/completions call with tools=[...]

  # ── SGLang fleet ────────────────────────────────────────────────────────
  # Switched from llama.cpp (GGUF) to SGLang: native HF safetensors instead
  # of GGUF. Every model is bf16/full-precision EXCEPT the two 70B+ entries
  # (qwen2.5-72b, command-r-plus-104b), which are deliberately pinned to
  # pre-quantized FP8-dynamic checkpoints — a real exception, not an
  # oversight, see the comment on each of those two entries for why. Each
  # entry assumes its own
  # `python -m sglang.launch_server --model-path <repo> --port <port>`
  # instance; only whichever ones are actually running will respond.
  # Ports assigned sequentially, 8080 upward, one per model — SGLang serves
  # one model per process, same as llama.cpp (no built-in multi-model
  # swapping on a single server instance).
  #
  # Use `--tp <N>` to tensor-parallel a model across N GPUs in one process —
  # this is SGLang's native multi-GPU story, cleaner than llama.cpp's
  # layer-offload split. On a 4x RTX 5090 (128GB VRAM total) workstation:
  #   - up to ~30B models: --tp 1 or --tp 2 comfortably
  #   - 70B+ models: --tp 4 to spread the full weight set across all 4 GPUs
  #
  # supports_tool_calling / --tool-call-parser: SGLang ships built-in parsers
  # for several known formats (hermes, llama3, mistral, qwen25, deepseekv3,
  # etc.) — pass the matching `--tool-call-parser <name>` flag at launch or
  # tool_calls will come back empty even for models that do support it.
  # Flags below reflect the same sourced findings as before, just re-scoped
  # to SGLang's parser support instead of llama.cpp's:
  #   - gpt-oss-20b: SGLang has an explicit "gptoss" tool-call parser
  #     (unlike llama.cpp, which lacked working support) — set true here,
  #     but still verify a real tool_calls response before trusting it.
  #   - qwen3-coder-30b-a3b: use `--tool-call-parser qwen25` (XML-style tags
  #     Qwen3-Coder still emits are handled by SGLang's Qwen parser) —
  #     verify before trusting.
  #   - deepseek-coder-v2-lite-16b: no confirmed dedicated SGLang parser at
  #     time of writing; same verify-before-trusting caveat as before.

  - name: qwen3-8b-instruct-sglang-local
    backend: openai_compatible
    model_id: Qwen/Qwen3-8B
    base_url: http://localhost:8080/v1
    api_key_env: null
    supports_tool_calling: true  # --tool-call-parser qwen25

  - name: llama3.1-8b-instruct-sglang-local
    backend: openai_compatible
    model_id: meta-llama/Llama-3.1-8B-Instruct
    base_url: http://localhost:8081/v1
    api_key_env: null
    supports_tool_calling: true  # --tool-call-parser llama3, confirmed via a real /v1/chat/completions call with tools=[...]

  - name: mistral-7b-instruct-v0.3-sglang-local
    backend: openai_compatible
    model_id: mistralai/Mistral-7B-Instruct-v0.3
    base_url: http://localhost:8082/v1
    api_key_env: null
    supports_tool_calling: true  # --tool-call-parser mistral

  - name: gemma4-12b-sglang-local
    backend: openai_compatible
    model_id: google/gemma-4-12B-it
    base_url: http://localhost:8083/v1
    api_key_env: null
    supports_tool_calling: true  # confirm SGLang parser support at launch time — gemma tool-call format not yet verified here

  - name: qwen2.5-14b-instruct-sglang-local
    backend: openai_compatible
    model_id: Qwen/Qwen2.5-14B-Instruct
    base_url: http://localhost:8084/v1
    api_key_env: null
    # the quantization-sensitivity caveat from the llama.cpp/GGUF version of
    # this entry no longer applies — SGLang serves the native safetensors
    # checkpoint with no quantization by default
    supports_tool_calling: true  # --tool-call-parser qwen25

  - name: gpt-oss-20b-sglang-local
    backend: openai_compatible
    model_id: openai/gpt-oss-20b
    base_url: http://localhost:8085/v1
    api_key_env: null
    supports_tool_calling: true  # see header note — SGLang has a dedicated "gptoss" parser, unlike llama.cpp; verify before trusting

  - name: gemma4-26b-a4b-sglang-local
    backend: openai_compatible
    model_id: google/gemma-4-26B-A4B-it
    base_url: http://localhost:8086/v1
    api_key_env: null
    supports_tool_calling: true  # confirm SGLang parser support at launch time — gemma tool-call format not yet verified here

  - name: qwen3-coder-30b-a3b-sglang-local
    backend: openai_compatible
    model_id: Qwen/Qwen3-Coder-30B-A3B-Instruct
    base_url: http://localhost:8087/v1
    api_key_env: null
    supports_tool_calling: true  # see header note — --tool-call-parser qwen25, verify before trusting

  - name: deepseek-coder-v2-lite-16b-sglang-local
    backend: openai_compatible
    model_id: deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
    base_url: http://localhost:8088/v1
    api_key_env: null
    supports_tool_calling: true  # see header note — no confirmed dedicated SGLang parser yet, verify before trusting

  - name: qwen2.5-72b-instruct-fp8-sglang-local
    backend: openai_compatible
    # kept as an 8-bit exception, same reasoning as the old llama.cpp Q8_0
    # pin, but re-scoped to SGLang's actual quant format: FP8, not GGUF's
    # Q8_0 block quantization (SGLang doesn't read GGUF at all). RTX 5090 is
    # Blackwell, so FP8 runs on native tensor-core support rather than being
    # emulated — pinned to a pre-quantized FP8-dynamic checkpoint (~72GB)
    # rather than the bf16 original (~144GB) + on-the-fly --quantization fp8,
    # since a pre-quantized checkpoint is the more reproducible choice. --tp
    # 2 or 4 to spread it across the RTX 5090s.
    model_id: mesolitica/Qwen2.5-72B-Instruct-FP8
    base_url: http://localhost:8089/v1
    api_key_env: null
    supports_tool_calling: true  # --tool-call-parser qwen25, native Hermes-style JSON tool calls; verify FP8 checkpoint preserves this before trusting

  - name: command-r-plus-104b-fp8-sglang-local
    backend: openai_compatible
    # same reasoning as qwen2.5-72b-fp8 above: FP8-dynamic checkpoint
    # (~104GB) instead of bf16 (~208GB), native Blackwell FP8 tensor cores.
    # --tp 4 to spread across all 4 GPUs.
    model_id: FriendliAI/c4ai-command-r-plus-fp8
    base_url: http://localhost:8090/v1
    api_key_env: null
    supports_tool_calling: true  # trained specifically for zero-shot multi-step tool use; verify SGLang parser support + FP8 checkpoint fidelity before trusting
