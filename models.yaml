# registry of models to benchmark.
models:
  - name: gemma4-ollama-local
    backend: openai_compatible
    model_id: gemma4
    base_url: http://localhost:11434/v1
    api_key_env: null
    supports_tool_calling: true   # confirmed via a real /v1/chat/completions call with tools=[...]

  # ── llama.cpp fleet ────────────────────────────────────────────────────
  # llama-server serves exactly ONE model per process — there's no
  # multi-model swapping built into llama.cpp itself. Each entry below
  # assumes its own `llama-server -m <gguf> --port <port>` instance; only
  # whichever ones are actually running will respond when a run hits them.
  # Ports assigned sequentially, 8080 upward, one per model.
  #
  # NO QUANTIZATION: every model_id below is pinned to the repo's
  # unquantized file (suffix "-f16.gguf", or "-f32.gguf" where that's the
  # only full-precision file offered) instead of a bare repo name, so a
  # runtime pull can't silently grab a quantized default — EXCEPT the two
  # 70B+ entries (qwen2.5-72b, command-r-plus-104b), which are a deliberate
  # 8-bit exception: full F16 at that size exceeds this workstation's 128GB
  # VRAM and would spill to slow system RAM, so those two are pinned to
  # Q8_0 GGUF files instead (near-lossless, fits fully in VRAM). Rough
  # F16/F32 footprints: 8B~16GB, 12-16B~24-32GB, 20B~40GB, 26-30B (MoE,
  # stores ALL experts)~52-60GB, 72B~144GB (Q8_0~77GB instead), 104B~208GB
  # (Q8_0~110GB instead). Only the filenames noted "(confirmed)" below were
  # checked against the actual HF file listing; the rest follow the same
  # bartowski/unsloth/ggml-org naming convention but haven't been
  # individually confirmed — verify the filename resolves before a real run.
  #
  # sm_120 (RTX 5090) note: llama.cpp compiles its CUDA kernels directly
  # against whatever -DCMAKE_CUDA_ARCHITECTURES you build for, rather than
  # depending on someone else's prebuilt architecture-specific wheel (the
  # class of problem that blocked SGLang/sgl-kernel on this hardware) —
  # build with -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=120.
  #
  # supports_tool_calling reflects real, sourced findings, not assumptions:
  #   - gpt-oss-20b: real, reproduced reports of llama.cpp specifically
  #     failing to emit proper tool_call structures (reasons about tools in
  #     plain text instead) across quantizations — set false so it defaults
  #     to text_block instead of silently producing parse_error-heavy runs.
  #   - qwen3-coder-30b-a3b: uses XML-style tool tags, not the Hermes JSON
  #     style llama.cpp's autoparser defaults to for most Qwen models —
  #     verify the actual tool_calls come back structured before trusting
  #     this flag; if they don't, flip to false.
  #   - deepseek-coder-v2-lite-16b: tool-calling only confirmed via a
  #     community-added Ollama template, not the base model's own format —
  #     same verify-before-trusting caveat.

  - name: qwen3-8b-instruct-llamacpp-local
    backend: openai_compatible
    model_id: Qwen/Qwen3-8B-GGUF:Qwen3-8B-f16.gguf
    base_url: http://localhost:8080/v1
    api_key_env: null
    supports_tool_calling: true

  - name: llama3.1-8b-instruct-llamacpp-local
    backend: openai_compatible
    model_id: bartowski/Meta-Llama-3.1-8B-Instruct-GGUF:Meta-Llama-3.1-8B-Instruct-f32.gguf  # confirmed
    base_url: http://localhost:8081/v1
    api_key_env: null
    supports_tool_calling: true  # confirmed via a real /v1/chat/completions call with tools=[...]

  - name: mistral-7b-instruct-v0.3-llamacpp-local
    backend: openai_compatible
    model_id: bartowski/Mistral-7B-Instruct-v0.3-GGUF:Mistral-7B-Instruct-v0.3-f32.gguf  # confirmed — this repo only ships f32, no f16 variant
    base_url: http://localhost:8082/v1
    api_key_env: null
    supports_tool_calling: true

  - name: gemma4-12b-llamacpp-local
    backend: openai_compatible
    model_id: unsloth/gemma-4-12b-it-GGUF:gemma-4-12b-it-BF16.gguf  # confirmed — unsloth repos ship BF16, not F16, as the unquantized file
    base_url: http://localhost:8083/v1
    api_key_env: null
    supports_tool_calling: true

  - name: qwen2.5-14b-instruct-llamacpp-local
    backend: openai_compatible
    model_id: bartowski/Qwen2.5-14B-Instruct-GGUF:Qwen2.5-14B-Instruct-f16.gguf  # confirmed
    base_url: http://localhost:8084/v1
    api_key_env: null
    # quantization has been reported to measurably affect this model's
    # function-calling behavior — pinned to the full F16 file specifically
    # to avoid that risk
    supports_tool_calling: true

  - name: gpt-oss-20b-llamacpp-local
    backend: openai_compatible
    model_id: ggml-org/gpt-oss-20b-GGUF:gpt-oss-20b-f16.gguf
    base_url: http://localhost:8085/v1
    api_key_env: null
    supports_tool_calling: false  # see header note — real, reproduced llama.cpp-specific failures

  - name: gemma4-26b-a4b-llamacpp-local
    backend: openai_compatible
    model_id: unsloth/gemma-4-26B-A4B-it-GGUF:gemma-4-26B-A4B-it-BF16.gguf  # unconfirmed — same unsloth F16->BF16 naming pattern seen on gemma-4-12b, verify filename before a real run
    base_url: http://localhost:8086/v1
    api_key_env: null
    supports_tool_calling: true

  - name: qwen3-coder-30b-a3b-llamacpp-local
    backend: openai_compatible
    model_id: unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Qwen3-Coder-30B-A3B-Instruct-BF16.gguf  # unconfirmed — same unsloth F16->BF16 naming pattern seen on gemma-4-12b, verify filename before a real run
    base_url: http://localhost:8087/v1
    api_key_env: null
    supports_tool_calling: true  # see header note — uses XML tool tags, verify before trusting

  - name: deepseek-coder-v2-lite-16b-llamacpp-local
    backend: openai_compatible
    model_id: bartowski/DeepSeek-Coder-V2-Lite-Instruct-GGUF:DeepSeek-Coder-V2-Lite-Instruct-f16.gguf
    base_url: http://localhost:8088/v1
    api_key_env: null
    supports_tool_calling: true  # see header note — community template, verify before trusting

  - name: qwen2.5-72b-instruct-q8-llamacpp-local
    backend: openai_compatible
    # deliberate 8-bit exception (see header note): F16 at 72B is ~144GB,
    # exceeds 128GB VRAM. Q8_0 (~77GB, confirmed 77.26GB on HF) fits
    # entirely in VRAM across the 4x RTX 5090s at full GPU speed.
    model_id: bartowski/Qwen2.5-72B-Instruct-GGUF:Qwen2.5-72B-Instruct-Q8_0.gguf  # confirmed
    base_url: http://localhost:8089/v1
    api_key_env: null
    supports_tool_calling: true  # native Hermes-style JSON tool calls, same family as the other Qwen2.5 entries above

  - name: command-r-plus-104b-q8-llamacpp-local
    backend: openai_compatible
    # deliberate 8-bit exception (see header note): F16 at 104B is ~208GB,
    # exceeds 128GB VRAM. Q8_0 (~110GB, confirmed: split into 4 standard
    # parts llama.cpp auto-merges from the first) fits with ~18GB headroom
    # for KV cache/context — tighter than the 72B entry, watch at long
    # context lengths.
    model_id: LiteLLMs/c4ai-command-r-plus-GGUF:Q8_0/Q8_0-00001-of-00004.gguf  # confirmed
    base_url: http://localhost:8090/v1
    api_key_env: null
    supports_tool_calling: true  # trained specifically for zero-shot multi-step tool use
